name: 🚀 Deploy Everyday Shop (Docker Hub → VPS)

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'resources/css/**'
      - 'resources/js/**'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'

env:
  IMAGE_NAME: shazimali/everyday-shop
  IMAGE_TAG: latest

# ------------------------------------------------
# 1️⃣ TEST JOB (BLOCKS DEPLOY ON FAILURE)
# ------------------------------------------------

jobs:
  
  test:
    name: 🧪 Run Laravel Tests (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🧱 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: ⚙️ Prepare testing environment
        run: |
          cp .env.testing .env
          php artisan key:generate
          php artisan migrate:fresh --force

      - name: 🧪 Run tests
        run: php artisan test

# ------------------------------------------------
# 2️⃣ BUILD & DEPLOY JOB (ONLY IF TESTS PASS)
# ------------------------------------------------

  build-and-deploy:
    name: 🚀 Build & Deploy to VPS
    needs: test
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: 🧱 Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4️⃣ Build and Push Docker Image
      - name: 🏗️ Build and Push Docker Image (CACHED)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5️⃣ Test SSH connection to VPS
      - name: 🧪 Test SSH connection
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "✅ SSH connection successful."
            docker --version || echo "⚠️ Docker not installed!"

      # 6️⃣ Copy docker-compose.yml to VPS
      - name: 📋 Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/var/www/everyday_shop/"
          overwrite: true

      # 7️⃣ Deploy on VPS
      - name: 🚀 Deploy on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/everyday_shop

            echo "📦 Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "🛑 Stopping old containers..."
            docker compose down

            echo "🗑️ Removing stale cache volume..."
            docker volume rm everyday_shop_everyday_shop_cache || true

            echo "🚀 Starting all containers..."
            docker compose up -d

            echo "⏳ Waiting for app to be ready..."
            sleep 5

            echo "🧹 Clearing Laravel cache..."
            docker exec everyday_shop_app php artisan optimize:clear

            echo "✅ Deployment successful!"